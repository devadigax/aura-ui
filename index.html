<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aura UI — A modern glassmorphism React component library with 23+ components, dark mode, and Bootstrap-compatible class names." />
    <title>Aura UI — React Component Library Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <!-- Optional anti-fouc theme load can be placed here -->
  <script>
    const s = localStorage.getItem('theme');
    const d = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (s === 'dark' || (!s && d)) document.documentElement.setAttribute('data-theme','dark');
  </script>
  <body class="no-transition">
    <div id="root"></div>
    <script>setTimeout(() => document.body.classList.remove('no-transition'), 50);</script>
    <script type="module" src="/src/showcase/main.jsx"></script>
  </body>
</html>
